name: "🔥 Pure IPTV — Python → .asm → .exe"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 0. БАЗОВАЯ ПОДГОТОВКА
      # ─────────────────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔵 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv
          pip install nuitka

      # ─────────────────────────────────────────────────────────────
      # 1. PYTHON → БАЙТКОД .ASM  (dis-дизассемблер)
      #    Первая трансформация: исходный Python-код превращается
      #    в мнемоники виртуальной машины CPython — это уже .asm!
      # ─────────────────────────────────────────────────────────────
      - name: "🧬 STEP 1 — Python bytecode → .asm (dis.dis)"
        shell: pwsh
        run: |
          python -c @'
import dis, sys, io, os

def disassemble_to_asm(src_path, out_path, label):
    with open(src_path, 'r', encoding='utf-8') as f:
        code = compile(f.read(), src_path, 'exec')

    with open(out_path, 'w', encoding='utf-8') as out:
        out.write(f'; {"="*65}\n')
        out.write(f'; Pure IPTV — {label}\n')
        out.write(f'; Source: {src_path}\n')
        out.write(f'; Tool:   Python {sys.version.split()[0]} dis module\n')
        out.write(f'; {"="*65}\n\n')

        old = sys.stdout
        sys.stdout = io.StringIO()
        dis.dis(code)
        result = sys.stdout.getvalue()
        sys.stdout = old
        out.write(result)

    size = os.path.getsize(out_path)
    print(f'✅ {out_path}  ({size/1024:.1f} KB)')

disassemble_to_asm('main.py', 'PureIPTV_bytecode.asm', 'Python Bytecode Disassembly')
'@

      # ─────────────────────────────────────────────────────────────
      # 2. PYTHON → C++ → ASM → .EXE  (Nuitka + MSVC)
      #    Nuitka компилирует Python в C++, затем MSVC/cl.exe
      #    превращает C++ в настоящий машинный код.
      #    Флаги MSVC /FA /Fa генерируют .asm-файлы каждого .cpp.
      # ─────────────────────────────────────────────────────────────
      - name: "🏗️ STEP 2 — Nuitka: Python → C++ → MSVC → EXE"
        shell: pwsh
        run: |
          # Устанавливаем переменные, чтобы MSVC генерировал .asm листинги
          # /FA  — assembly listing (code + machine code)
          # /Fa"$pwd\build\asm\" — куда складывать .asm файлы
          $asmDir = "$pwd\build\nuitka-asm"
          New-Item -ItemType Directory -Force -Path $asmDir | Out-Null

          # Nuitka сама управляет MSVC; мы не можем напрямую передать /FA,
          # но можем установить флаги через CFLAGS (Nuitka их подхватывает)
          $env:CFLAGS = "/FA /Fa$asmDir\"
          $env:CXXFLAGS = "/FA /Fa$asmDir\"

          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --include-data-dir=mpv=mpv `
            --include-data-file=main.qml=main.qml `
            --include-qt-plugins=qml `
            --assume-yes-for-downloads `
            --output-dir=build `
            main.py

          Write-Host "`n✅ Nuitka build complete"

      # ─────────────────────────────────────────────────────────────
      # 3. MSVC DUMPBIN: .EXE → x86-64 .ASM
      #    Дизассемблируем готовый исполняемый файл обратно в
      #    настоящий ассемблер x86-64 — полный цикл: .py → .asm → .exe → .asm
      # ─────────────────────────────────────────────────────────────
      - name: "🛠️ STEP 3 — Set up MSVC tools (dumpbin)"
        uses: ilammy/msvc-dev-cmd@v1

      - name: "🔬 STEP 4 — dumpbin /DISASM → x86-64 .asm"
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exePath) { throw "❌ No EXE found!" }

          Write-Host "🎯 EXE: $($exePath.FullName)"
          $exeSize = (Get-Item $exePath.FullName).Length
          Write-Host "   Size: $([math]::Round($exeSize/1MB, 2)) MB"
          echo "EXE_PATH=$($exePath.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

          # dumpbin /DISASM: дьявол кроется в деталях
          Write-Host "🔬 Disassembling to x86-64 assembly (this may take a while)..."

          $asmOut = "PureIPTV_x86-64.asm"
          dumpbin /DISASM "$($exePath.FullName)" 2>$null | Out-File -FilePath $asmOut -Encoding ascii

          if ((Test-Path $asmOut) -and ((Get-Item $asmOut).Length -gt 1KB)) {
              $size = (Get-Item $asmOut).Length
              Write-Host "✅ x86-64 .asm generated: $([math]::Round($size/1KB, 2)) KB"
          } else {
              Write-Host "⚠️ dumpbin output too small, retrying with /DISASM:NOBYTES..."
              dumpbin /DISASM:NOBYTES "$($exePath.FullName)" 2>$null | Out-File -FilePath $asmOut -Encoding ascii
              $size = (Get-Item $asmOut).Length
              Write-Host "   Retry result: $([math]::Round($size/1KB, 2)) KB"
          }

          # Если dumpbin не дал результата, создаём символический .asm
          if (-not (Test-Path $asmOut) -or ((Get-Item $asmOut).Length -lt 100)) {
              Write-Host "⚠️ dumpbin failed, generating synthetic .asm from symbol table..."
              @"
; ============================================================
; Pure IPTV — x86-64 Disassembly (synthetic)
; Source: $($exePath.Name)
; Tool:   dumpbin /DISASM (symbols only)
; ============================================================

; Full disassembly was too large or unavailable.
; Below is the symbol table summary:

"@ | Out-File -FilePath $asmOut
              dumpbin /SYMBOLS "$($exePath.FullName)" 2>$null >> $asmOut
              dumpbin /EXPORTS "$($exePath.FullName)" 2>$null >> $asmOut
          }

      # ─────────────────────────────────────────────────────────────
      # 5. СОБИРАЕМ ВСЁ В КУЧУ
      # ─────────────────────────────────────────────────────────────
      - name: "📊 STEP 5 — Manifest"
        shell: pwsh
        run: |
          Write-Host "`n📦 === BUILD MANIFEST ==="
          $items = @(
              @{Path = $env:EXE_PATH; Label = "EXE (Nuitka onefile)"},
              @{Path = "PureIPTV_bytecode.asm"; Label = "Python bytecode .asm"},
              @{Path = "PureIPTV_x86-64.asm"; Label = "x86-64 assembly .asm"}
          )
          $totalSize = 0
          foreach ($item in $items) {
              if (Test-Path $item.Path) {
                  $size = (Get-Item $item.Path).Length
                  $totalSize += $size
                  Write-Host "   ✅ $($item.Label): $($item.Path) — $([math]::Round($size/1MB, 2)) MB"
              } else {
                  Write-Host "   ❌ $($item.Label): $($item.Path) — MISSING"
              }
          }
          Write-Host "   ─────────────────────────"
          Write-Host "   📦 Total: $([math]::Round($totalSize/1MB, 2)) MB`n"

      - name: "📦 STEP 6 — ZIP: .exe + .asm + assets"
        shell: pwsh
        run: |
          $items = @()

          # EXE
          if (Test-Path $env:EXE_PATH) { $items += $env:EXE_PATH }

          # .asm файлы
          if (Test-Path "PureIPTV_bytecode.asm") { $items += "PureIPTV_bytecode.asm" }
          if (Test-Path "PureIPTV_x86-64.asm") { $items += "PureIPTV_x86-64.asm" }

          # Также ищем промежуточные .asm от MSVC /FA
          $nuitkaAsms = Get-ChildItem -Path build -Recurse -Filter "*.asm" -ErrorAction SilentlyContinue
          foreach ($asm in $nuitkaAsms) {
              $items += $asm.FullName
          }

          $zipName = "PureIPTV-ASM-EXE.zip"
          Compress-Archive -Path $items -DestinationPath $zipName -CompressionLevel Optimal

          $size = (Get-Item $zipName).Length
          Write-Host "✅ ZIP: $zipName  ($([math]::Round($size/1MB, 2)) MB)"

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-ASM-EXE
          path: PureIPTV-ASM-EXE.zip