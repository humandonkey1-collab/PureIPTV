name: Build Premium APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev wget unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем конкретную версию для стабильности
          pip install pyside6==6.7.2 shiboken6==6.7.2 requests python-mpv
          pip install jinja2 pkginfo tqdm "packaging==24.1"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # СКАЧИВАЕМ ANDROID WHEELS (Решает твою ошибку!)
      - name: Download Android Wheels
        run: |
          mkdir -p android_wheels
          cd android_wheels
          wget https://download.qt.io/official_releases/Qt_for_Python/pyside6/PySide6-6.7.2-cp310-cp310-android_aarch64.whl
          wget https://download.qt.io/official_releases/Qt_for_Python/shiboken6/shiboken6-6.7.2-cp310-cp310-android_aarch64.whl
          echo "WHEEL_PYSIDE=$(pwd)/PySide6-6.7.2-cp310-cp310-android_aarch64.whl" >> $GITHUB_ENV
          echo "WHEEL_SHIBOKEN=$(pwd)/shiboken6-6.7.2-cp310-cp310-android_aarch64.whl" >> $GITHUB_ENV

      - name: Set Android Environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Находим актуальный путь к NDK
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)
          echo "ANDROID_NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          # Запускаем сборку, передавая скачанные "колеса" и пути к SDK/NDK
          pyside6-android-deploy \
            --spec pysidedeploy.spec \
            --wheel-pyside ${{ env.WHEEL_PYSIDE }} \
            --wheel-shiboken ${{ env.WHEEL_SHIBOKEN }} \
            --sdk-path $ANDROID_SDK_ROOT \
            --ndk-path $ANDROID_NDK_PATH

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "*.apk"
