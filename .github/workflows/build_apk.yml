name: Build Premium APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip jq curl libmpv-dev libdouble-conversion3 libxcb-cursor0 libpcre2-16-0 libfontconfig1 libx11-xcb1 libicu-dev libxkbcommon-x11-0 libdbus-1-3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install pyside6==6.8.0 shiboken6==6.8.0 requests python-mpv qtpip jinja2 pkginfo tqdm "packaging==24.1"
          
          # 1. АВТОМАТИЧЕСКИЙ ПОИСК И ЗАГРУЗКА libmpv.so
          echo "Finding latest mpv-android release..."
          LATEST_TAG=$(curl -s https://api.github.com/repos/mpv-android/mpv-android/releases/latest | jq -r .tag_name)
          echo "Latest tag: $LATEST_TAG"
          
          # Скачиваем APK для arm64-v8a
          URL="https://github.com/mpv-android/mpv-android/releases/download/${LATEST_TAG}/mpv-android-${LATEST_TAG}-arm64-v8a.apk"
          echo "Downloading from: $URL"
          wget $URL -O mpv-tmp.apk
          
          # Вытаскиваем библиотеку
          unzip mpv-tmp.apk "lib/arm64-v8a/libmpv.so" -d .
          mv lib/arm64-v8a/libmpv.so .
          echo "libmpv.so successfully extracted."

          # 2. Скачиваем Android-библиотеки Qt
          mkdir -p wheels_dir
          cd wheels_dir
          wget https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          wget https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          cd ..
          
          PYSIDE_PATH=$(readlink -f wheels_dir/PySide6-*.whl)
          SHIBOKEN_PATH=$(readlink -f wheels_dir/shiboken6-*.whl)
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)

          # 3. Запуск сборки
          pyside6-android-deploy \
            -c pysidedeploy.spec \
            --name PureIPTV \
            --wheel-pyside "$PYSIDE_PATH" \
            --wheel-shiboken "$SHIBOKEN_PATH" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$NDK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "**/*.apk"
          if-no-files-found: error
