name: Build Premium APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код из репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем системные библиотеки для MPV и графики
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev wget unzip

      # 3. Настраиваем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Устанавливаем ВСЕ необходимые инструменты и зависимости сборщика
      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          # Базовые библиотеки нашего приложения
          pip install pyside6 shiboken6 requests python-mpv
          # Внутренние зависимости PySide6 для Android Deploy (исправляет прошлую ошибку)
          pip install jinja2 pkginfo tqdm "packaging==24.1"

      # 5. Настраиваем Java (нужна для Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Запускаем процесс сборки APK
      - name: Run PySide6 Android Deploy
        run: |
          # Используем спецификацию из файла pysidedeploy.spec
          pyside6-android-deploy --spec pysidedeploy.spec

      # 7. Сохраняем готовый APK файл как артефакт (можно будет скачать)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium-Build
          path: "*.apk"
          if-no-files-found: error
          retention-days: 7
