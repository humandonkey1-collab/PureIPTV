name: Unzip and Clean

on:
  push:                 # Запускается при пуше в любую ветку
  workflow_dispatch:    # Можно запустить вручную

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip .zip files
        run: |
          # Ищем все .zip файлы в корне репозитория
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              echo "📦 Found: $zipfile"
              # Распаковываем в папку с тем же именем (без .zip)
              dirname="${zipfile%.zip}"
              mkdir -p "$dirname"
              unzip -q "$zipfile" -d "$dirname"
              echo "✅ Extracted to: $dirname"
              # Удаляем архив
              rm -v "$zipfile"
              echo "🗑️ Removed: $zipfile"
            else
              echo "❌ No .zip files found."
            fi
          done

      - name: Commit and push changes (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto-unzip and cleanup"
          git push
          
