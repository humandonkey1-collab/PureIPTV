name: Build with Nuitka and pack .zpaq

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv
          pip install nuitka

      - name: Build EXE with Nuitka (auto-download Dependency Walker)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --include-data-dir=mpv=mpv `
            --include-data-file=main.qml=main.qml `
            --assume-yes-for-downloads `
            --output-dir=build `
            main.py

      - name: Find EXE file path
        id: find_exe
        run: |
          $exePath = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "✅ Found EXE at: $($exePath.FullName)"
            echo "EXE_PATH=$($exePath.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "EXE_DIR=$($exePath.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "EXE_NAME=$($exePath.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "❌ No EXE found in build folder!"
            exit 1
          }
        shell: pwsh

      - name: Install zpaq
        run: |
          curl -L -o zpaq.exe "https://github.com/zpaq/zpaq/releases/download/v7.15/zpaq.exe"
          if (-not (Test-Path "zpaq.exe")) {
            Write-Host "❌ Failed to download zpaq"
            exit 1
          }
          $bytes = Get-Content -Path "zpaq.exe" -TotalCount 2 -AsByteStream -ReadCount 2
          $header = ($bytes[0], $bytes[1]) -join ','
          if ($header -ne "77,90") {
            Write-Host "❌ Downloaded zpaq.exe is not a valid EXE (header: $header)"
            exit 1
          }
          Write-Host "✅ zpaq.exe downloaded"
        shell: pwsh

      - name: Pack EXE into .zpaq archive
        run: |
          .\zpaq.exe a PureIPTV-Nuitka.zpaq "$env:EXE_PATH"
          if (Test-Path "PureIPTV-Nuitka.zpaq") {
            Write-Host "✅ Archive created: PureIPTV-Nuitka.zpaq"
            $size = (Get-Item "PureIPTV-Nuitka.zpaq").Length
            Write-Host "📦 Archive size: $([math]::Round($size/1MB, 2)) MB"
          } else {
            Write-Host "❌ Failed to create archive"
            exit 1
          }
        shell: pwsh

      - name: Upload zpaq archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Nuitka-zpaq
          path: PureIPTV-Nuitka.zpaq
