name: Build and Test Windows EXE (UPX)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv pyinstaller

      - name: Download UPX
        run: |
          curl -L https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          Expand-Archive -Path upx.zip -DestinationPath upx
          echo "$env:GITHUB_WORKSPACE/upx/upx-4.2.4-win64" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Build EXE with PyInstaller (with UPX exclude for problematic DLLs)
        run: |
          pyinstaller --onefile `
            --add-data "main.qml;." `
            --add-data "mpv;mpv" `
            --hidden-import PySide6.QtQml `
            --hidden-import PySide6.QtQuick `
            --strip `
            --upx-exclude "_socket.pyd" `
            --upx-exclude "python311.dll" `
            --name PureIPTV `
            main.py

      - name: Compress with UPX (force mode, exclude critical DLLs)
        run: |
          upx --best --lzma --force dist/PureIPTV.exe
        shell: pwsh

      # =====================================================
      # 🔥 САМЫЙ ВАЖНЫЙ ШАГ — АВТО-ТЕСТ .exe
      # =====================================================
      - name: Test EXE (check for Python DLL errors)
        run: |
          Write-Host "🧪 Testing PureIPTV.exe for Python DLL loading issues..."
          $exePath = "dist\PureIPTV.exe"
          $output = & $exePath 2>&1
          $exitCode = $LASTEXITCODE
          
          # Выводим полный вывод для отладки
          Write-Host "📄 Output:"
          Write-Host $output
          
          # Проверяем наличие фатальной ошибки загрузки Python DLL
          $errorPattern = "Failed to load Python DLL|Invalid access to memory location|python311.dll"
          if ($output -match $errorPattern) {
            Write-Host "❌ Python DLL Error detected in built EXE!"
            Write-Host "🔍 Error details: $($output -match $errorPattern)"
            exit 1
          }
          
          if ($exitCode -ne 0) {
            Write-Host "⚠️ EXE crashed with exit code $exitCode, but no Python DLL error found."
            # Можно продолжить — может, это просто выход без ошибки
          } else {
            Write-Host "✅ EXE loaded Python DLL successfully and executed without fatal errors."
          }
          
          Write-Host "🎉 Test passed! The EXE is safe to download."
        shell: pwsh
        timeout-minutes: 2   # Защита от зависаний

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-EXE
          path: dist/PureIPTV.exe
